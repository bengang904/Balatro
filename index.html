<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <script>const PREFIX = "Balatro_demo_"; const originalOpen = indexedDB.open; const originalDeleteDatabase = indexedDB.deleteDatabase; indexedDB.open = function (name, version) { const prefixedName = PREFIX + name; return version !== undefined ? originalOpen.call(this, prefixedName, version) : originalOpen.call(this, prefixedName); }; indexedDB.deleteDatabase = function (name) { const prefixedName = PREFIX + name; return originalDeleteDatabase.call(this, prefixedName); };</script>
    <script src="love.min.js"></script>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <title>Love.js Launcher</title>
    <style>
        body, html { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background: #000; }
        #canvas { display: block; width: 100vw; height: 100vh; }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; color: #ccc; font-family: sans-serif; }
        #progress-bar { width: 50%; height: 20px; border: 2px solid #444; border-radius: 10px; overflow: hidden; background: #1a1a1a; display: none; }
        #progress-fill { width: 0%; height: 100%; background: #666; transition: width 0.1s linear; }
        #start-btn { padding: 15px 30px; font-size: 20px; cursor: pointer; background: #333; color: #ddd; border: 1px solid #555; border-radius: 5px; }
        #start-btn:hover { background: #444; }
        #status { margin-top: 15px; font-size: 16px; color: #888; }
    </style>
</head>

<body>
    <div id="loader">
        <button id="start-btn">启动加载</button>
        <div id="progress-bar"><div id="progress-fill"></div></div>
        <div id="status"></div>
    </div>
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <script>
        const startBtn = document.getElementById('start-btn');
        const fill = document.getElementById('progress-fill');
        const status = document.getElementById('status');
        const progressBar = document.getElementById('progress-bar');
        const loader = document.getElementById('loader');

        startBtn.onclick = async () => {
            startBtn.style.display = 'none';
            progressBar.style.display = 'block';
            status.innerText = "系统优先分配资源中...";
            
            const scriptUrl = "https://cold-silence-567c.bengang904.workers.dev/?url=https://ia600705.us.archive.org/8/items/module_202606/module.js";
            const CACHE_NAME = 'game-cache-v1';
            const TOTAL_BYTES = 114651 * 1024;

            const cache = await caches.open(CACHE_NAME);
            let response = await cache.match(scriptUrl);

            if (!response) {
                status.innerText = "正在从网络获取核心数据...";
                const rawResponse = await fetch(scriptUrl);
                const reader = rawResponse.body.getReader();
                let receivedLength = 0;
                let chunks = [];
                while(true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    chunks.push(value);
                    receivedLength += value.length;
                    let percent = Math.min(Math.round((receivedLength / TOTAL_BYTES) * 100), 100);
                    fill.style.width = percent + '%';
                    status.innerText = `正在优先加载数据... ${percent}%`;
                }
                await cache.put(scriptUrl, new Response(new Blob(chunks)));
                response = await cache.match(scriptUrl);
            } else {
                fill.style.width = '100%';
                status.innerText = "读取本地缓存...";
            }

            const script = document.createElement('script');
            script.textContent = await response.clone().text();
            document.head.appendChild(script);

            status.innerText = "引擎初始化...";
            const d = await getSource();
            
            Module = {
                canvas: document.getElementById('canvas'),
                arguments: ["game.love"],
                preRun: [(mod) => { mod.FS_createDataFile('/', "game.love", d, true, true, true); }],
                onRuntimeInitialized: () => { loader.style.display = 'none'; }
            };
            Love(Module);
        };
    </script>
</body>
</html>
